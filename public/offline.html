<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — CaseFlow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: #134e4a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    .available {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      text-align: left;
      margin-bottom: 1.75rem;
    }

    .available-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #14b8a6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.625rem;
    }

    .available ul { list-style: none; }

    .available li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #cbd5e1;
      padding: 0.25rem 0;
    }

    .check {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background: #134e4a;
      color: #14b8a6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 900;
      flex-shrink: 0;
    }

    .btn {
      display: block;
      width: 100%;
      background: #14b8a6;
      color: #042f2e;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.8rem 1.5rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 0.75rem;
    }

    .btn:hover { background: #0d9488; color: white; }

    .btn-secondary {
      background: transparent;
      color: #64748b;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.6rem;
      border: 1px solid #1e293b;
      border-radius: 0.75rem;
      cursor: pointer;
      width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-secondary:hover { color: #e2e8f0; border-color: #334155; }

    .status {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #475569;
    }

    #status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      vertical-align: middle;
      margin-right: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #134e4a;
      color: #14b8a6;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.25rem 0.6rem;
      border-radius: 9999px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- Wifi-off icon (inline SVG, no deps) -->
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1"/>
      </svg>
    </div>

    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      Offline mode active
    </div>

    <h1>You're Offline</h1>
    <p class="subtitle">
      No internet connection detected.<br>
      These pages are still available from your last visit:
    </p>

    <div class="available">
      <div class="available-label">Available Offline</div>
      <ul>
        <li><span class="check">✓</span> Dashboard</li>
        <li><span class="check">✓</span> My Goals</li>
        <li><span class="check">✓</span> Profile</li>
        <li><span class="check">✓</span> Settings</li>
        <li><span class="check">✓</span> Help &amp; Support</li>
      </ul>
    </div>

    <button class="btn" onclick="retry()">Try Again</button>
    <button class="btn-secondary" onclick="goPortal()">Back to Portal</button>

    <p class="status">
      <span id="status-dot"></span>
      <span id="status-text">Offline</span>
    </p>
  </div>

  <script>
    function retry() {
      window.location.reload();
    }

    function goPortal() {
      window.location.href = '/portal/client';
    }

    // Live connectivity detection
    function updateStatus() {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (navigator.onLine) {
        dot.style.background = '#22c55e';
        text.textContent = 'Back online — click Try Again to continue';
      } else {
        dot.style.background = '#ef4444';
        text.textContent = 'No network connection';
      }
    }

    window.addEventListener('online', () => {
      updateStatus();
      // Auto-retry after brief delay
      setTimeout(() => window.location.reload(), 1500);
    });

    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
